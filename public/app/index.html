<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Task Manager</title>
        <link rel="stylesheet" href="../styles/style.css" />
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="app-container">
            <div class="card">
                <div class="header">
                    <h1>Task Manager</h1>
                    <button id="logout-btn" class="logout-btn">Logout</button>
                </div>

                <form class="task-form" id="task-form">
                    <div class="left">
                        <input type="text" placeholder="Title" id="title" />
                        <input
                            type="text"
                            placeholder="Description"
                            id="description"
                        />
                    </div>
                    <div class="right">
                        <input type="date" id="dueDate" />
                    </div>
                    <button type="submit" id="task-btn">Add Task</button>
                </form>
                <p id="error-text"></p>

                <div id="tasks-container" class="tasks-container"></div>
            </div>
            <div id="modal" class="modal hidden">
                <div class="modal-content">
                    <h2>Edit Task</h2>
                    <input type="text" id="modal-title" placeholder="Title" />
                    <input
                        type="text"
                        id="modal-description"
                        placeholder="Description"
                    />
                    <input type="date" id="modal-dueDate" />
                    <label class="modal-checkbox">
                        <input type="checkbox" id="modal-completed" />
                        Completed
                    </label>
                    <p id="modal-error-text"></p>
                    <div class="modal-buttons">
                        <button id="save-btn">Save</button>
                        <button id="delete-btn">Delete</button>
                        <button id="close-btn">Close</button>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
