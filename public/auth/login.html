<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Login</title>
        <link rel="stylesheet" href="../styles/style.css" />
    </head>
    <body>
        <div class="auth-container">
            <div class="auth-card">
                <h2>Login</h2>

                <form id="login-form">
                    <input
                        type="email"
                        id="email"
                        placeholder="Email"
                        required
                    />
                    <input
                        type="password"
                        id="password"
                        placeholder="Password"
                        required
                    />
                    <button type="submit">Login</button>
                </form>

                <p id="error-text"></p>

                <p class="auth-link">
                    Don't have an account?
                    <a href="register.html">Register</a>
                </p>
            </div>
        </div>

        <script src="auth.js"></script>
    </body>
</html>
